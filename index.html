<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forest World - Multiplayer & Idle Fix</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #5ea1ff; 
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: #fff; 
            font-family: "Arial", sans-serif; 
            background: rgba(0,0,0,0.6); 
            padding: 12px; 
            border-radius: 8px;
            font-size: 14px; 
            pointer-events: none; 
            z-index: 10;
        }
        #chat-box {
            position: absolute; 
            bottom: 60px; 
            left: 10px;
            width: 320px; 
            height: 150px; 
            background: rgba(0, 0, 0, 0.3);
            color: white; 
            font-family: sans-serif; 
            font-size: 13px;
            overflow-y: auto; 
            padding: 8px; 
            pointer-events: none; 
            border-radius: 5px;
        }
        #chat-input {
            position: absolute; 
            bottom: 20px; 
            left: 10px;
            width: 310px; 
            background: white; 
            border: none; 
            padding: 10px;
            display: none; 
            z-index: 20; 
            border-radius: 5px; 
            outline: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>CONTROLS</b><br>
        WASD: Move | Space: Jump<br>
        Right-Click: Look | Scroll: Zoom<br>
        Enter: Chat (/name [text] to rename)
    </div>
    
    <div id="editor" style="position: absolute; top: 150px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; display: none; z-index: 30; width: 200px;">
    <b style="font-size: 16px;">Character Editor</b><br><br>
    
    <label>Body Color:</label><br>
    <input type="color" id="bodyColor" value="#111111" style="width:100%"><br><br>
    
    <label>Head Color:</label><br>
    <input type="color" id="headColor" value="#FFFF00" style="width:100%"><br><br>
    
    <label>Hat Color:</label><br>
    <input type="color" id="hatColor" value="#ff0000" style="width:100%"><br><br>
    
    <label>Hat Style:</label><br>
        <select id="hatStyle" style="width: 100%; margin-bottom: 10px;">
            <option value="none">None</option>
            <option value="flat">Flat Cap</option>
            <option value="top">Top Hat</option>
            <option value="tall">Tall Hat</option>
            <option value="cone">Party Hat</option>
            <option value="crown">Crown</option>
            <option value="halo">Halo</option>
        </select>
    
    <button id="resetBtn" style="width: 100%; margin-bottom: 5px; cursor: pointer; background: #ff4444; color: white; border: none; padding: 5px;">Reset Appearance</button>
    <button onclick="toggleEditor()" style="width: 100%; padding: 5px; cursor: pointer;">Close (E)</button>
</div>

    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Type message or /name...">

    <script src="/socket.io/socket.io.js"></script>

            skyLoader.load(skyData, (tex) => {
                tex.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = tex;
                scene.environment = tex;
            });
        } else {
            scene.background = new THREE.Color(0x5ea1ff);
        }

        // --- 3. LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- 4. MODEL CREATOR ---
        function createPlayerModel(color = 0x111111) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const stickMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // Torso & Head
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.2), mat);
            torso.position.y = 1.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xFFFF00 }));
            head.position.y = 2.75;
            
            // --- UPDATED HAT SYSTEM (MANY HATS) ---
            const hatGroup = new THREE.Group();
            
            // 1. Base Brim (Flat, Top, Tall)
            const brim = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            brim.position.y = 0.35;
            
            // 2. Hat Top (Flat, Top, Tall)
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            top.position.y = 0.6; // Sits on brim
            
            // 3. Cone Hat
            const coneGeo = new THREE.ConeGeometry(0.3, 1, 16);
            const coneMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const cone = new THREE.Mesh(coneGeo, coneMat);
            cone.position.y = 0.8;
            cone.visible = false;
            
            // 4. Crown
            const crownGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 8, 1, true); // Open cylinder
            const crownMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, side: THREE.DoubleSide }); // Gold
            const crown = new THREE.Mesh(crownGeo, crownMat);
            crown.position.y = 0.5;
            crown.visible = false;
            
            // 5. Halo
            const haloGeo = new THREE.TorusGeometry(0.4, 0.05, 8, 30);
            const haloMat = new THREE.MeshStandardMaterial({ color: 0xFFFFE0, emissive: 0xFFFFE0 }); // Glowing white
            const halo = new THREE.Mesh(haloGeo, haloMat);
            halo.position.y = 1.0;
            halo.rotation.x = Math.PI / 2;
            halo.visible = false;

            hatGroup.add(brim, top, cone, crown, halo);
            hatGroup.visible = false; 
            head.add(hatGroup);

            group.add(torso, head);
            
            // Limbs
            const createLimb = (x, y) => {
                const g = new THREE.Group(); g.position.set(x, y, 0);
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.2), stickMat);
                m.position.y = -0.5; g.add(m); return g;
            };
            const limbs = { lArm: createLimb(-0.35, 2.3), rArm: createLimb(0.35, 2.3), lLeg: createLimb(-0.15, 1), rLeg: createLimb(0.15, 1) };
            group.add(limbs.lArm, limbs.rArm, limbs.lLeg, limbs.rLeg);

            // Store everything for the editor
            group.userData.limbs = limbs;
            group.userData.hat = hatGroup;
            group.userData.hatTop = top; // Reference to change height
            group.userData.brim = brim;  // reference to brim
            group.userData.cone = cone;
            group.userData.crown = crown;
            group.userData.halo = halo;
            return group;
        }

        // --- 5. LOCAL PLAYER SETUP ---
        let playerName = "Player";
        const player = createPlayerModel(0x111111);
        scene.add(player);

        // --- 6. LABEL SYSTEM (TAGS & BUBBLES) ---
        function setLabel(target, text, type) {
            const old = target.userData[type];
            if(old) target.remove(old);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = (type === 'tag') ? 256 : 512;
            canvas.height = (type === 'tag') ? 64 : 128;

            if(type === 'bubble') {
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.beginPath(); 
                ctx.roundRect(10, 10, 492, 108, 20); 
                ctx.fill();
                ctx.strokeStyle = "black"; 
                ctx.lineWidth = 4; 
                ctx.stroke();
            }

            ctx.fillStyle = (type === 'tag') ? "white" : "black";
            ctx.font = (type === 'tag') ? "bold 32px Arial" : "bold 42px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width/2, (type === 'tag') ? 45 : 75);

            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            
            sprite.position.y = (type === 'tag') ? 4.2 : 5.5;
            sprite.scale.set((type === 'tag') ? 3 : 4.5, (type === 'tag') ? 0.75 : 1.1, 1);
            
            target.add(sprite);
            target.userData[type] = sprite;

            if(type === 'bubble') {
                setTimeout(() => {

                }, 4000);
            }
        }

        document.getElementById('hatStyle').addEventListener('change', (e) => {

            const top = player.userData.hatTop;
            const brim = player.userData.brim;
            const cone = player.userData.cone;
            const crown = player.userData.crown;
            const halo = player.userData.halo;

            // 1. Hide ALL hat parts first to "clear the head"
            hat.visible = false;
            brim.visible = false;
            top.visible = false;
            cone.visible = false;
            crown.visible = false;
            halo.visible = false;

            if (style === "none") return;

            // 2. Show the main hat group
            hat.visible = true; 

            // 3. Logic for standard hats (Brim + Top)
            if (style === "flat" || style === "top" || style === "tall") {
                brim.visible = true;
                top.visible = true;
                top.scale.set(1, 1, 1); // Reset height

                if (style === "flat") { 
                    top.scale.y = 0.1; 
                    top.position.y = 0.40; 
                } else if (style === "top") { 
                    top.scale.y = 1.2; 
                    top.position.y = 0.7; 
                } else if (style === "tall") { 
                    top.scale.y = 2.8; 
                    top.position.y = 1.1; 
                }
            }

            else if (style === "cone") { cone.visible = true; }
            else if (style === "crown") { crown.visible = true; }
            else if (style === "halo") { halo.visible = true; }

            // 5. Tell the server so other players see the change
            socket.emit('updateAppearance', { type: 'hatStyle', style: style });
        });

            // 2. Show the main hat group
            ud.hat.visible = true; 

            // 3. Style Specific Logic
            if (style === "flat" || style === "top" || style === "tall") {

                ud.hatTop.visible = true;

socket.on('updatePlayerAppearance', (data) => {
    const p = otherPlayers[data.id];
    if (!p) return; // If the player isn't loaded yet, skip

    if (data.type === 'body') {
        // Change Torso
        p.children[0].material.color.set(data.color);
        // Change Limbs
        Object.values(p.userData.limbs).forEach(limb => {
            limb.children[0].material.color.set(data.color);
        });
    } 
    else if (data.type === 'head') {
        // Change Head
        p.children[1].material.color.set(data.color);
    } 
    else if (data.type === 'hatColor') {
        // Change Hat Colors
        p.userData.brim.material.color.set(data.color);
        p.userData.hatTop.material.color.set(data.color);
        p.userData.cone.material.color.set(data.color);
    } 
    else if (data.type === 'hatStyle') {
        // Use a helper to swap the actual 3D models
        updateRemoteHatStyle(p, data.style);
    }
});

// Helper function specifically for OTHER players' hats
function updateRemoteHatStyle(targetPlayer, style) {
    const ud = targetPlayer.userData;
    
    // Hide all parts
    [ud.hat, ud.brim, ud.hatTop, ud.cone, ud.crown, ud.halo].forEach(part => {
        if(part) part.visible = false;
    });

    if (style === "none") return;

    ud.hat.visible = true;
    if (["flat", "top", "tall"].includes(style)) {
        ud.brim.visible = true;
        ud.hatTop.visible = true;
        ud.hatTop.scale.set(1, (style === "flat" ? 0.1 : style === "top" ? 1.2 : 2.8), 1);
        ud.hatTop.position.y = (style === "flat" ? 0.4 : style === "top" ? 0.7 : 1.1);
    } 
    else if (style === "cone") ud.cone.visible = true;
    else if (style === "crown") ud.crown.visible = true;
    else if (style === "halo") ud.halo.visible = true;
}

                }
            }
        });
        
socket.on('currentPlayers', (players) => {
    Object.keys(players).forEach((id) => {
        // 1. Skip if it's me
        if (id === socket.id) return; 

        // 2. Skip if I already have a model for this player
        if (otherPlayers[id]) return;

        const data = players[id];
        
        // 3. Create the model (using your addOther logic or createPlayerModel)
        const newModel = createPlayerModel(data.colors.body);
        scene.add(newModel);
        otherPlayers[id] = newModel;
        
        // 4. Set their saved looks immediately
        if (data.colors) {
            newModel.children[0].material.color.set(data.colors.body);
            newModel.children[1].material.color.set(data.colors.head);
            
            // Set limb colors to match body
            Object.values(newModel.userData.limbs).forEach(limb => {
                limb.children[0].material.color.set(data.colors.body);
            });
        }
        
        // 5. Set their hat style
        if (data.hatStyle) {
            updateRemoteHatStyle(newModel, data.hatStyle);
        }

        // 6. Set their name tag
        setLabel(newModel, data.name || "Guest", 'tag');
    });
});
        socket.on('newPlayer', (data) => {

        otherPlayers[data.id] = newModel;

});

            scene.add(m); 
            setLabel(m, d.name || "Guest", 'tag');
        }

        // --- 9. INPUT HANDLING & EDITOR (THE ONLY ONE!) ---
        let keys = {}, isChatting = false, isEditing = false, yaw = 0, pitch = 0, dist = 20;
        const input = document.getElementById('chat-input'), box = document.getElementById('chat-box');
        const editorMenu = document.getElementById('editor');

        function toggleEditor() {
            if (isChatting) return; // Don't open editor while typing
            isEditing = !isEditing;
            editorMenu.style.display = isEditing ? "block" : "none";
            if(isEditing) {
                keys = {}; // Stop moving when menu opens
                document.exitPointerLock?.(); // Release mouse if using pointerlock
            }
        }

        window.addEventListener('keydown', e => {
            // ENTER KEY: Chat
            if(e.key === "Enter") {
                if(!isChatting) { 
                    isChatting = true; 
                    input.style.display = "block"; 
                    input.focus(); 
                    keys = {}; 
                } else {
                    let val = input.value.trim();
                    if(val.startsWith("/name ")) { 
                        playerName = val.split(" ")[1] || "Player"; 
                        setLabel(player, playerName, 'tag'); 
                        socket.emit('updateName', playerName); 
                    } else if(val) { 
                        setLabel(player, val, 'bubble'); 
                        socket.emit('chatMessage', val); 
                    }
                    input.value = ""; 
                    input.style.display = "none"; 
                    isChatting = false;
                }
                return;
            }

            // E KEY: Character Editor
            if(e.key.toLowerCase() === "e" && !isChatting) {
                toggleEditor();
            }

            // Movement keys (only if not busy)
            if(!isChatting && !isEditing) {
                keys[e.key.toLowerCase()] = true;
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // Mouse Controls
        window.addEventListener('mousemove', e => { 
            if(e.buttons === 2) { 
                yaw -= e.movementX * 0.004; 
                pitch += e.movementY * 0.004; 
                pitch = Math.max(-1.5, Math.min(1.5, pitch)); 
            }
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- 10. GAME LOOP ---
        let vy = 0, walk = 0, idleTime = 0;
        const pBBox = new THREE.Box3();

        function check(nx, nz) { 
            pBBox.setFromCenterAndSize(
                new THREE.Vector3(nx, player.position.y + 1.5, nz), 
                new THREE.Vector3(0.8, 2.8, 0.8)
            ); 
            return !colliders.some(c => pBBox.intersectsBox(c)); 
        }

        function animate() {
            requestAnimationFrame(animate);
            let dx = 0, dz = 0, mov = false;
            
            if(!isChatting) {
                const s = 0.25;
                if(keys['w']) { dx -= Math.sin(yaw)*s; dz -= Math.cos(yaw)*s; mov = true; }
                if(keys['s']) { dx += Math.sin(yaw)*s; dz += Math.cos(yaw)*s; mov = true; }
                if(keys['a']) { dx -= Math.cos(yaw)*s; dz += Math.sin(yaw)*s; mov = true; }
                if(keys['d']) { dx += Math.cos(yaw)*s; dz -= Math.sin(yaw)*s; mov = true; }
                
                vy -= 0.02; 
                player.position.y += vy;
                
                if(player.position.y < 0) { 
                    player.position.y = 0; 
                    vy = 0; 
                    if(keys[' ']) vy = 0.45; 
                }
            }

            if(check(player.position.x + dx, player.position.z)) player.position.x += dx;
            if(check(player.position.x, player.position.z + dz)) player.position.z += dz;
            
            const L = player.userData.limbs;
            if(mov) {
                player.rotation.y = Math.atan2(dx, dz); 
                walk += 0.2;
                L.lLeg.rotation.x = Math.sin(walk)*0.8; 
                L.rLeg.rotation.x = -Math.sin(walk)*0.8;
                L.lArm.rotation.x = -Math.sin(walk)*0.8; 
                L.rArm.rotation.x = Math.sin(walk)*0.8;
            } else {
                idleTime += 0.05;
                L.lLeg.rotation.x *= 0.8; 
                L.rLeg.rotation.x *= 0.8;
                L.lArm.rotation.x = Math.sin(idleTime * 0.5) * 0.1; 
                L.rArm.rotation.x = -Math.sin(idleTime * 0.5) * 0.1;
            }

            camera.position.x = player.position.x + Math.sin(yaw)*dist*Math.cos(pitch);
            camera.position.z = player.position.z + Math.cos(yaw)*dist*Math.cos(pitch);
            camera.position.y = (player.position.y+2.2) + Math.sin(pitch)*dist;
            camera.lookAt(player.position.x, player.position.y+2.2, player.position.z);
            
            socket.emit('playerMovement', { 
                x: player.position.x, 
                y: player.position.y, 
                z: player.position.z, 
                ry: player.rotation.y 
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- HAT STYLE LOGIC ---
        document.getElementById('hatStyle').addEventListener('change', (e) => {
            const style = e.target.value;
            const hat = player.userData.hat;
            const top = player.userData.hatTop;

            if (style === "none") {
                hat.visible = false;
            } else {
                hat.visible = true;
                // Reset scale/pos before applying new style
                top.scale.set(1, 1, 1); 
                
                if (style === "flat") {
                    top.scale.y = 0.1;
                    top.position.y = 0.40;
                } else if (style === "top") {
                    top.scale.y = 1.2;
                    top.position.y = 0.7;
                } else if (style === "tall") {
                    top.scale.y = 2.8;
                    top.position.y = 1.1;
                }
            }
            // Sync with others
            socket.emit('updateAppearance', { type: 'hatStyle', style: style });
        });

        // --- RESET BUTTON LOGIC ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            // 1. Reset Colors to Default
            player.children[0].material.color.set(0x111111); // Body
            player.children[1].material.color.set(0xFFFF00); // Head
            player.userData.hat.children[0].material.color.set(0xff0000); // Hat Brim
            player.userData.hat.children[1].material.color.set(0xff0000); // Hat Top
            
            // 2. Hide Hat
            player.userData.hat.visible = false;

            // 3. Reset UI Menus
            document.getElementById('bodyColor').value = "#111111";
            document.getElementById('headColor').value = "#FFFF00";
            document.getElementById('hatColor').value = "#ff0000";
            document.getElementById('hatStyle').value = "none";

            // 4. Tell Server
            socket.emit('updateAppearance', { type: 'reset' });
        });
        
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth/window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
        // --- HAT & RESET LOGIC ---
document.getElementById('hatStyle').addEventListener('change', (e) => {
    const style = e.target.value;
    const hat = player.userData.hat;
    const top = player.userData.hatTop;

    if (style === "none") {
        hat.visible = false;
    } else {
        hat.visible = true;
        top.scale.set(1, 1, 1); // Reset height before changing
        
        if (style === "flat") {
            top.scale.y = 0.1;
            top.position.y = 0.40;
        } else if (style === "top") {
            top.scale.y = 1.2;
            top.position.y = 0.7;
        } else if (style === "tall") {
            top.scale.y = 2.8;
            top.position.y = 1.1;
        }
    }
    // Sync with other players
    socket.emit('updateAppearance', { type: 'hatStyle', style: style });
});

        // Hat Color
        document.getElementById('hatColor').addEventListener('input', (e) => {
            const color = e.target.value;
            player.userData.hat.material.color.set(color);
            socket.emit('updateAppearance', { type: 'hatColor', color: color });
        });

        // Reset Appearance
        document.getElementById('resetBtn').addEventListener('click', () => {
            // Default Colors
            const defBody = "#111111";
            const defHead = "#FFFF00";
            const defHat = "#ff0000";

            // Apply locally
            player.children[0].material.color.set(defBody);
            Object.values(player.userData.limbs).forEach(l => l.children[0].material.color.set(defBody));
            player.children[1].material.color.set(defHead);
            player.userData.hat.material.color.set(defHat);
            player.userData.hat.visible = false;

            // Sync with UI
            document.getElementById('bodyColor').value = defBody;
            document.getElementById('headColor').value = defHead;
            document.getElementById('hatColor').value = defHat;

            // Tell server
            socket.emit('updateAppearance', { type: 'reset' });
        });
        // --- 11. CLEANUP (REMOVE GHOSTS) ---
socket.on('playerDisconnected', (id) => {
    if (otherPlayers[id]) {
        // 1. Physically remove the 3D model from the world
        scene.remove(otherPlayers[id]);
        
        // 2. Delete the reference from your 'otherPlayers' list
        delete otherPlayers[id];
        
        console.log(`Removed ghost for player: ${id}`);
    }
});
        // --- ZOOM SYSTEM ---
let zoomDistance = 15; // Starting distance
const minZoom = 5;      // Max zoom in
const maxZoom = 40;     // Max zoom out

// 1. Listen for mouse scroll
window.addEventListener('wheel', (event) => {
    // Adjust zoom distance based on scroll direction
    zoomDistance += event.deltaY * 0.05;

    // Clamp values so camera doesn't go through the floor or too far away
    zoomDistance = Math.max(minZoom, Math.min(maxZoom, zoomDistance));
});

// 2. Update camera position every frame
// We hook into the existing animation loop by adding an Interval
// or you can move these lines into your existing animate() function
setInterval(() => {
    if (typeof player !== 'undefined' && camera) {
        // Calculate the offset based on the current zoomDistance
        const relativeCameraOffset = new THREE.Vector3(0, zoomDistance * 0.6, zoomDistance);
        const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);

        // Smoothly move camera to the offset position
        camera.position.lerp(cameraOffset, 0.1);
        camera.lookAt(player.position);
    }
}, 1000 / 60); // Run at 60fps
    </script>
